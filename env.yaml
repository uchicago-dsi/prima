name: prima
channels:
  - pytorch
  - nvidia
  - conda-forge
channel_priority: strict
dependencies:
  - python=3.8
  - pip
  # core (pin numpy below 1.23 to satisfy scipy 1.7.3)
  - numpy=1.22.4
  - pandas=1.4.3
  - scipy=1.7.3
  - pyarrow
  # gpu stack (choose one; comment CPU alt below)
  - pytorch=1.9.0
  - torchvision=0.10.0
  - pytorch-cuda=11.1
  # tools
  - pydicom=2.3.0
  - ipykernel
  - selenium
  - firefox
  - geckodriver
  - pip:
      - -r file:requirements.txt
