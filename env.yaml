name: prima
channels:
  - conda-forge
channel_priority: strict
dependencies:
  - python=3.11
  - pip
  # Keep the main env focused on QC / preprocessing / analysis. Heavyweight
  # torch + model-serving stacks should live in a separate env.
  - pip:
      - numpy
      - pandas
      - scipy
      - pyarrow
      - pydicom
      - matplotlib
      - scikit-image
      - scikit-learn
      - lifelines
      - pillow
      - tqdm
      - imageio
      - beautifulsoup4
      - einops
      - lxml
      - omegaconf
      - requests
      - zarr
      - numcodecs
      - gitpython
      - huggingface_hub
      - ipykernel
      - ruff
      - opencv-python-headless
